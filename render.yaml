services:
  - type: web
    name: book-my-ticket-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node migrate.mjs && node index.mjs
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: book-my-ticket-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: book-my-ticket-backend
          property: url
